<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Professional QR Code Generator</title>
    <style>
        /* ========== RESET & BASE STYLES ========== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        /* Animated background effect */
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="30" cy="20" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="5" r="2.5" fill="rgba(255,255,255,0.1)"/><circle cx="70" cy="15" r="1.8" fill="rgba(255,255,255,0.1)"/><circle cx="85" cy="30" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-repeat: repeat;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        /* ========== MAIN CONTAINER ========== */
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideInUp 0.6s ease-out;
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* ========== HEADER SECTION ========== */
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '◻◻◻';
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            bottom: -20px;
            right: -20px;
            transform: rotate(-15deg);
            font-family: monospace;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: fadeInDown 0.6s ease-out;
        }
        
        .header p {
            opacity: 0.95;
            font-size: 1.1em;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* ========== CONTENT SECTION ========== */
        
        .content {
            padding: 40px;
        }
        /* Input Group */
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            font-size: 1.2em;
        }
        
        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        /* QR Type Cards */
        
        .qr-type-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .qr-type-card {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
            position: relative;
            overflow: hidden;
        }
        
        .qr-type-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .qr-type-card:hover::before {
            left: 100%;
        }
        
        .qr-type-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }
        
        .qr-type-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f0ff 0%, #ffffff 100%);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .qr-type-card input[type="radio"] {
            display: none;
        }
        
        .qr-type-card label {
            cursor: pointer;
            margin: 0;
            font-weight: 600;
            font-size: 1.1em;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .card-icon {
            font-size: 2.5em;
            display: block;
        }
        /* Color Options */
        
        .color-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .color-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .color-input label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }
        
        .color-preview {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .color-preview span {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        input[type="color"] {
            width: 60px;
            height: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            background: white;
        }
        /* Style Select */
        
        .style-group {
            margin-bottom: 25px;
        }
        
        .style-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }
        
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        /* Logo Upload */
        
        .logo-upload {
            margin-bottom: 25px;
        }
        
        .logo-upload label {
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }
        
        .file-upload-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .file-upload-label:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        
        .file-name {
            margin-top: 8px;
            font-size: 0.85em;
            color: #666;
            text-align: center;
        }
        /* Generate Button */
        
        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .generate-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .generate-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .generate-btn:active {
            transform: translateY(0);
        }
        /* Loading Animation */
        
        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-right: 4px solid #764ba2;
            border-bottom: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        /* Result Section */
        
        .result {
            margin-top: 30px;
            text-align: center;
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .result.show {
            display: block;
        }
        
        .qr-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .qr-image {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .qr-image img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .download-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        /* Error Message */
        
        .error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            animation: shake 0.5s;
        }
        
        .error.show {
            display: block;
        }
        
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }
        /* Info Section */
        
        .info-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: center;
        }
        
        .info-section p {
            color: #666;
            font-size: 0.9em;
        }
        
        .info-section .tips {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .tip {
            background: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #667eea;
        }
        /* Responsive Design */
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .content {
                padding: 25px;
            }
            .header h1 {
                font-size: 1.8em;
            }
            .qr-type-group {
                grid-template-columns: 1fr;
            }
            .color-group {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }
            .header {
                padding: 25px 20px;
            }
        }
        /* Print Styles */
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .generate-btn,
            .download-btn,
            .info-section {
                display: none;
            }
            .result {
                display: block !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎯 QR Code Generator Pro</h1>
            <p>Create stunning QR codes in seconds - Free & Easy to use</p>
        </div>

        <div class="content">
            <div class="input-group">
                <label>🔗 Enter URL or Text</label>
                <div class="input-wrapper">
                    <span class="input-icon">📝</span>
                    <input type="text" id="data" placeholder="https://www.instagram.com/its_tony_0018/" value="https://www.instagram.com/its_tony_0018/">
                </div>
            </div>

            <div class="qr-type-group">
                <div class="qr-type-card selected" data-type="basic">
                    <input type="radio" name="qr_type" value="basic" id="basic" checked>
                    <label for="basic">
                        <span class="card-icon">🎨</span>
                        <span>Basic Style</span>
                        <small style="font-size: 0.8em; font-weight: normal;">Custom colors</small>
                    </label>
                </div>
                <div class="qr-type-card" data-type="styled">
                    <input type="radio" name="qr_type" value="styled" id="styled">
                    <label for="styled">
                        <span class="card-icon">✨</span>
                        <span>Styled</span>
                        <small style="font-size: 0.8em; font-weight: normal;">Rounded & Gradient</small>
                    </label>
                </div>
                <div class="qr-type-card" data-type="logo">
                    <input type="radio" name="qr_type" value="logo" id="logo">
                    <label for="logo">
                        <span class="card-icon">🏷️</span>
                        <span>With Logo</span>
                        <small style="font-size: 0.8em; font-weight: normal;">Add your brand</small>
                    </label>
                </div>
            </div>

            <div id="basic-options">
                <div class="color-group">
                    <div class="color-input">
                        <label>🎨 Fill Color</label>
                        <div class="color-preview">
                            <input type="color" id="fill_color" value="#000000">
                            <span id="fillColorPreview" style="background: #000000;"></span>
                        </div>
                    </div>
                    <div class="color-input">
                        <label>⬜ Background Color</label>
                        <div class="color-preview">
                            <input type="color" id="back_color" value="#ffffff">
                            <span id="backColorPreview" style="background: #ffffff; border: 1px solid #ddd;"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="styled-options" style="display: none;">
                <div class="style-group">
                    <label>🎭 Style Type</label>
                    <select id="style">
                        <option value="rounded">🔘 Rounded Corners</option>
                        <option value="gradient">🌈 Gradient Effect</option>
                        <option value="default">📦 Default Style</option>
                    </select>
                </div>
            </div>

            <div id="logo-options" style="display: none;">
                <div class="logo-upload">
                    <label>🖼️ Upload Logo (Optional)</label>
                    <div class="file-upload-wrapper">
                        <div class="file-upload-label">
                            📁 Choose Logo Image
                        </div>
                        <input type="file" id="logo" accept="image/*">
                    </div>
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">
                ⚡ Generate QR Code
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating your QR code...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <div class="qr-card">
                    <div class="qr-image">
                        <img id="qrImage" alt="Generated QR Code">
                    </div>
                    <button class="download-btn" id="downloadBtn">
                        💾 Download QR Code
                    </button>
                </div>
            </div>

            <div class="info-section">
                <p>💡 <strong>Pro Tips:</strong></p>
                <div class="tips">
                    <span class="tip">📱 Test scan before printing</span>
                    <span class="tip">🎨 Dark colors scan better</span>
                    <span class="tip">📏 Keep at least 2cm margin</span>
                    <span class="tip">🔍 Minimum size: 2cm x 2cm</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const dataInput = document.getElementById('data');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        const qrImage = document.getElementById('qrImage');
        const fillColorInput = document.getElementById('fill_color');
        const backColorInput = document.getElementById('back_color');
        const styleSelect = document.getElementById('style');
        const logoInput = document.getElementById('logo');
        const fileNameSpan = document.getElementById('fileName');

        // Color previews
        const fillColorPreview = document.getElementById('fillColorPreview');
        const backColorPreview = document.getElementById('backColorPreview');

        // Current QR data storage
        let currentQRData = null;

        // Update color previews
        fillColorInput.addEventListener('input', function() {
            fillColorPreview.style.background = this.value;
        });

        backColorInput.addEventListener('input', function() {
            backColorPreview.style.background = this.value;
        });

        // Update file name display
        logoInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                fileNameSpan.textContent = `Selected: ${this.files[0].name}`;
                fileNameSpan.style.color = '#28a745';
            } else {
                fileNameSpan.textContent = '';
            }
        });

        // Type switching functionality
        document.querySelectorAll('.qr-type-card').forEach(card => {
            card.addEventListener('click', function() {
                // Update selected state
                document.querySelectorAll('.qr-type-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');

                // Update radio button
                const radio = this.querySelector('input[type="radio"]');
                if (radio) radio.checked = true;

                // Get selected type
                const type = this.dataset.type;

                // Show/hide options based on type
                document.getElementById('basic-options').style.display = type === 'basic' ? 'block' : 'none';
                document.getElementById('styled-options').style.display = type === 'styled' ? 'block' : 'none';
                document.getElementById('logo-options').style.display = type === 'logo' ? 'block' : 'none';

                // Animate transition
                const options = [document.getElementById('basic-options'),
                    document.getElementById('styled-options'),
                    document.getElementById('logo-options')
                ];
                options.forEach(opt => {
                    if (opt.style.display === 'block') {
                        opt.style.animation = 'fadeInUp 0.3s ease-out';
                    }
                });
            });
        });

        // Show error message
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Hide error
        function hideError() {
            errorDiv.classList.remove('show');
        }

        // Show/hide loading
        function setLoading(loading) {
            if (loading) {
                loadingDiv.classList.add('show');
                generateBtn.disabled = true;
                generateBtn.style.opacity = '0.7';
            } else {
                loadingDiv.classList.remove('show');
                generateBtn.disabled = false;
                generateBtn.style.opacity = '1';
            }
        }

        // Generate QR Code
        async function generateQRCode() {
            const data = dataInput.value.trim();

            if (!data) {
                showError('⚠️ Please enter a URL or text');
                dataInput.focus();
                return;
            }

            // Validate URL if it looks like one
            if (data.includes('.') && !data.startsWith('http')) {
                if (!confirm('The URL should start with http:// or https://. Continue anyway?')) {
                    return;
                }
            }

            const qrType = document.querySelector('input[name="qr_type"]:checked').value;
            const fillColor = fillColorInput.value;
            const backColor = backColorInput.value;
            const style = styleSelect.value;

            // Prepare form data
            const formData = new FormData();
            formData.append('data', data);
            formData.append('qr_type', qrType);
            formData.append('fill_color', fillColor);
            formData.append('back_color', backColor);
            formData.append('style', style);

            if (qrType === 'logo' && logoInput.files[0]) {
                formData.append('logo', logoInput.files[0]);
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    // Display QR code
                    qrImage.src = `data:image/png;base64,${result.image}`;
                    resultDiv.classList.add('show');

                    // Scroll to result
                    resultDiv.scrollIntoView({
                        behavior: 'smooth',
                        block: 'nearest'
                    });

                    // Store data for download
                    currentQRData = {
                        data: data,
                        qrType: qrType,
                        fillColor: fillColor,
                        backColor: backColor,
                        style: style
                    };

                    // Add success animation
                    const qrCard = document.querySelector('.qr-card');
                    qrCard.style.animation = 'none';
                    setTimeout(() => {
                        qrCard.style.animation = 'fadeInUp 0.5s ease-out';
                    }, 10);

                } else {
                    showError(result.error || '❌ Failed to generate QR code');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('❌ Network error. Please check if the server is running.');
            } finally {
                setLoading(false);
            }
        }

        // Download QR Code
        async function downloadQRCode() {
            if (!currentQRData) {
                showError('No QR code to download');
                return;
            }

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(currentQRData)
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `qrcode_${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);

                    // Show success feedback
                    const downloadBtn = document.getElementById('downloadBtn');
                    const originalText = downloadBtn.innerHTML;
                    downloadBtn.innerHTML = '✅ Downloaded!';
                    setTimeout(() => {
                        downloadBtn.innerHTML = originalText;
                    }, 2000);
                } else {
                    showError('Failed to download QR code');
                }
            } catch (error) {
                console.error('Download error:', error);
                showError('Error downloading QR code');
            }
        }

        // Event listeners
        generateBtn.addEventListener('click', generateQRCode);
        downloadBtn.addEventListener('click', downloadQRCode);

        // Enter key support
        dataInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });

        // Auto-fill example URLs on focus if empty
        dataInput.addEventListener('focus', function() {
            if (!this.value) {
                this.placeholder = 'e.g., https://www.instagram.com/your-profile';
            }
        });

        // Add copy functionality (optional)
        function copyToClipboard() {
            if (qrImage.src) {
                const tempCanvas = document.createElement('canvas');
                const img = new Image();
                img.onload = () => {
                    tempCanvas.width = img.width;
                    tempCanvas.height = img.height;
                    tempCanvas.getContext('2d').drawImage(img, 0, 0);
                    tempCanvas.toBlob(blob => {
                        navigator.clipboard.write([
                            new ClipboardItem({
                                [blob.type]: blob
                            })
                        ]);
                        showTemporaryMessage('QR code copied to clipboard!');
                    });
                };
                img.src = qrImage.src;
            }
        }

        function showTemporaryMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = message;
            msgDiv.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #28a745;
                color: white;
                padding: 10px 20px;
                border-radius: 10px;
                z-index: 1000;
                animation: fadeInUp 0.3s;
            `;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // Welcome message
        console.log('QR Code Generator Pro - Ready to create amazing QR codes!');

        // Pre-fill with Instagram URL if empty
        if (!dataInput.value) {
            dataInput.value = 'https://www.instagram.com/its_tony_0018/';
        }
    </script>
</body>
